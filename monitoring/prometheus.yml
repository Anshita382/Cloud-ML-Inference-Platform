global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "fastapi"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "inference-api"

  - job_name: "fastapi-instrumentation"
    metrics_path: "/prom-metrics"
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "inference-api-auto"
